<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin :: html(adminContent=~{::admin-content}, adminScripts=~{::admin-scripts}, adminHeadExtra=~{}, headerActions=~{::header-actions})}">
<head><title>Item Form</title></head>
<body>

<th:block th:fragment="header-actions">
  <div style="display:flex; gap:8px;">
    <a th:href="@{/admin/items}" class="btn-admin-secondary">← All Items</a>
    <a th:if="${mode == 'edit'}"
       th:href="@{/catalog/{slug}(slug=${item.slug})}" target="_blank"
       class="btn-admin-outline">View on Site ↗</a>
  </div>
</th:block>

<th:block th:fragment="admin-content">

  <div style="display:grid; grid-template-columns:1fr 300px; gap:1.25rem; align-items:start;">

    <!-- LEFT: Main form -->
    <div>
      <form th:action="${mode == 'create'} ? @{/admin/items} : @{/admin/items/{id}(id=${item.id})}"
            th:object="${item}" method="post" style="display:flex; flex-direction:column; gap:1.25rem;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <!-- Basic Info -->
        <div class="admin-card">
          <div class="admin-card-header"><span class="admin-card-title">Basic Information</span></div>
          <div class="admin-card-body" style="display:flex; flex-direction:column; gap:1rem;">
            <div>
              <label class="admin-label">Item Name <span style="color:#ef4444;">*</span></label>
              <input type="text" th:field="*{name}" id="nameInput" oninput="autoSlug(this.value)"
                     class="admin-input" placeholder="e.g. Stainless Steel Chafing Dish Set"/>
              <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="admin-field-error"></div>
            </div>
            <div>
              <label class="admin-label">URL Slug</label>
              <input type="text" th:field="*{slug}" id="slugInput" class="admin-input"
                     placeholder="auto-generated-from-name"
                     oninput="this.dataset.manual='1'; document.getElementById('slugPreview').textContent=this.value||'slug'"/>
              <div style="font-family:'Montserrat',sans-serif; font-size:0.65rem; color:#9ca3af; margin-top:4px;">
                URL: /catalog/<strong id="slugPreview" th:text="${item.slug ?: 'slug'}">slug</strong>
              </div>
            </div>
            <div>
              <label class="admin-label">Category <span style="color:#ef4444;">*</span></label>
              <select th:field="*{categoryId}" class="admin-input">
                <option value="">— Select a category —</option>
                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}">Cat</option>
              </select>
              <div th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}" class="admin-field-error"></div>
            </div>
            <div>
              <label class="admin-label">Description</label>
              <textarea th:field="*{description}" rows="4" class="admin-input" style="resize:vertical;"
                        placeholder="Describe this item — dimensions, accessories, ideal events…"></textarea>
            </div>
          </div>
        </div>

        <!-- Pricing & Inventory -->
        <div class="admin-card">
          <div class="admin-card-header"><span class="admin-card-title">Pricing &amp; Inventory</span></div>
          <div class="admin-card-body" style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
            <div>
              <label class="admin-label">Price Per Day <span style="color:#ef4444;">*</span></label>
              <div style="position:relative;">
                <span style="position:absolute; left:10px; top:50%; transform:translateY(-50%); color:#9ca3af; font-family:'Montserrat',sans-serif; font-size:0.82rem;">$</span>
                <input type="number" th:field="*{pricePerDay}" step="0.01" min="0"
                       class="admin-input" style="padding-left:24px;" placeholder="0.00"/>
              </div>
              <div th:if="${#fields.hasErrors('pricePerDay')}" th:errors="*{pricePerDay}" class="admin-field-error"></div>
            </div>
            <div>
              <label class="admin-label">Deposit Override</label>
              <div style="position:relative;">
                <span style="position:absolute; left:10px; top:50%; transform:translateY(-50%); color:#9ca3af; font-family:'Montserrat',sans-serif; font-size:0.82rem;">$</span>
                <input type="number" th:field="*{depositAmount}" step="0.01" min="0"
                       class="admin-input" style="padding-left:24px;" placeholder="Auto (30%)"/>
              </div>
            </div>
            <div>
              <label class="admin-label">Qty in Stock <span style="color:#ef4444;">*</span></label>
              <input type="number" th:field="*{quantityInStock}" min="1" class="admin-input" placeholder="1"/>
              <div th:if="${#fields.hasErrors('quantityInStock')}" th:errors="*{quantityInStock}" class="admin-field-error"></div>
            </div>
            <div>
              <label class="admin-label">Min Rental Days</label>
              <input type="number" th:field="*{minRentalDays}" min="1" class="admin-input" placeholder="1"/>
            </div>
          </div>
        </div>

        <!-- Details -->
        <div class="admin-card">
          <div class="admin-card-header"><span class="admin-card-title">Item Details</span></div>
          <div class="admin-card-body" style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
            <div>
              <label class="admin-label">Dimensions</label>
              <input type="text" th:field="*{dimensions}" class="admin-input" placeholder='24"W x 16"D'/>
            </div>
            <div>
              <label class="admin-label">Color</label>
              <input type="text" th:field="*{color}" class="admin-input" placeholder="Silver, Gold…"/>
            </div>
            <div>
              <label class="admin-label">Material</label>
              <input type="text" th:field="*{material}" class="admin-input" placeholder="Stainless Steel…"/>
            </div>
            <div>
              <label class="admin-label">Sort Order</label>
              <input type="number" th:field="*{sortOrder}" min="0" class="admin-input"/>
            </div>
            <div style="grid-column:1/-1;">
              <label class="admin-label">Care Instructions</label>
              <textarea th:field="*{careInstructions}" rows="2" class="admin-input" style="resize:none;"
                        placeholder="Handle with care. Clean after each use…"></textarea>
            </div>
          </div>
        </div>

        <!-- Submit -->
        <div style="display:flex; gap:10px;">
          <button type="submit" class="btn-admin-primary" style="flex:1; justify-content:center; padding:11px;"
                  th:text="${mode == 'create'} ? 'Create Item' : 'Save Changes'">Save</button>
          <a th:href="@{/admin/items}" class="btn-admin-secondary" style="padding:11px 20px;">Cancel</a>
        </div>
      </form>
    </div>

    <!-- RIGHT: Visibility + Images -->
    <div style="display:flex; flex-direction:column; gap:1.25rem; position:sticky; top:72px;">

      <!-- Visibility -->
      <div class="admin-card">
        <div class="admin-card-header"><span class="admin-card-title">Visibility</span></div>
        <div class="admin-card-body" style="display:flex; flex-direction:column; gap:0.75rem;">
          <label style="display:flex; align-items:center; gap:10px; cursor:pointer;">
            <input type="checkbox" th:field="*{active}" style="accent-color:#C9A84C; width:16px; height:16px;"/>
            <div>
              <div style="font-family:'Montserrat',sans-serif; font-size:0.82rem; font-weight:600; color:#0B1628;">Active</div>
              <div style="font-family:'Montserrat',sans-serif; font-size:0.68rem; color:#9ca3af;">Show in public catalog</div>
            </div>
          </label>
          <label style="display:flex; align-items:center; gap:10px; cursor:pointer;">
            <input type="checkbox" th:field="*{featured}" style="accent-color:#C9A84C; width:16px; height:16px;"/>
            <div>
              <div style="font-family:'Montserrat',sans-serif; font-size:0.82rem; font-weight:600; color:#0B1628;">Featured ★</div>
              <div style="font-family:'Montserrat',sans-serif; font-size:0.68rem; color:#9ca3af;">Show on homepage</div>
            </div>
          </label>
        </div>
      </div>

      <!-- Images (edit mode only) -->
      <div th:if="${mode == 'edit'}" class="admin-card">
        <div class="admin-card-header"><span class="admin-card-title">Images</span></div>
        <div class="admin-card-body">
          <!-- Existing images grid -->
          <div id="imgGrid" style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px;">
            <div th:each="img : ${itemDetail?.images}"
                 th:id="'img-'+${img.id}"
                 style="position:relative; border-radius:2px; overflow:hidden; background:#F5E6B8;"
                 th:style="'padding-top:80%; position:relative; border-radius:2px; overflow:hidden; background:'+(${img.isPrimary} ? '#F5E6B8' : '#f4f1ec')">
              <img th:src="${img.s3Url}" th:alt="${img.altText}"
                   style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover;"/>
              <div th:if="${img.isPrimary}"
                   style="position:absolute; top:4px; left:4px; background:#C9A84C; color:#0B1628; font-family:'Montserrat',sans-serif; font-size:0.55rem; font-weight:700; padding:2px 6px; border-radius:1px;">
                PRIMARY
              </div>
              <div style="position:absolute; inset:0; background:rgba(0,0,0,0); transition:background 0.2s; display:flex; align-items:center; justify-content:center; gap:4px; opacity:0;"
                   class="img-overlay"
                   onmouseover="this.style.background='rgba(0,0,0,0.5)'; this.style.opacity='1';"
                   onmouseout="this.style.background='rgba(0,0,0,0)'; this.style.opacity='0';">
                <button th:unless="${img.isPrimary}"
                        th:onclick="'setPrimary(\''+${item.id}+'\',\''+${img.id}+'\')'"
                        style="background:rgba(201,168,76,0.9); color:#0B1628; border:none; border-radius:1px; font-size:0.6rem; padding:3px 7px; cursor:pointer;">★</button>
                <button th:onclick="'deleteImg(\''+${item.id}+'\',\''+${img.id}+'\')'"
                        style="background:rgba(239,68,68,0.9); color:#fff; border:none; border-radius:1px; font-size:0.6rem; padding:3px 7px; cursor:pointer;">✕</button>
              </div>
            </div>
          </div>

          <!-- Upload drop zone -->
          <div id="dropZone"
               style="border:2px dashed rgba(201,168,76,0.5); border-radius:2px; padding:1.25rem; text-align:center; cursor:pointer; transition:border-color 0.2s, background 0.2s;"
               onclick="document.getElementById('imgFile').click()"
               ondragover="event.preventDefault(); this.style.background='rgba(201,168,76,0.06)'; this.style.borderColor='#C9A84C';"
               ondragleave="this.style.background=''; this.style.borderColor='rgba(201,168,76,0.5)';"
               ondrop="handleDrop(event)">
            <div style="color:#C9A84C; font-size:1.5rem; margin-bottom:6px;">↑</div>
            <div style="font-family:'Montserrat',sans-serif; font-size:0.72rem; color:#6b7280;">Click or drag to upload</div>
            <div style="font-family:'Montserrat',sans-serif; font-size:0.65rem; color:#9ca3af; margin-top:2px;">JPEG, PNG, WebP — max 10 MB</div>
          </div>
          <input type="file" id="imgFile" accept="image/jpeg,image/png,image/webp"
                 style="display:none;" onchange="uploadImg(this.files[0])"/>

          <!-- Progress bar -->
          <div id="uploadProg" style="display:none; margin-top:8px;">
            <div style="height:3px; background:#F5E6B8; border-radius:2px; overflow:hidden;">
              <div id="uploadBar" style="height:100%; background:#C9A84C; width:0%; transition:width 0.3s;"></div>
            </div>
            <div style="font-family:'Montserrat',sans-serif; font-size:0.65rem; color:#9ca3af; text-align:center; margin-top:4px;">Uploading…</div>
          </div>
        </div>
      </div>
    </div>
  </div>

</th:block>

<th:block th:fragment="admin-scripts">
<script th:if="${mode == 'edit'}" th:inline="javascript">
  const ITEM_ID = /*[[${itemDetail?.id}]]*/ '';
  const CSRF = document.cookie.match(/XSRF-TOKEN=([^;]+)/)?.[1] || '';

  function autoSlug(val) {
    if (document.getElementById('slugInput').dataset.manual) return;
    const s = val.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
    document.getElementById('slugInput').value = s;
    document.getElementById('slugPreview').textContent = s || 'slug';
  }

  async function uploadImg(file) {
    if (!file) return;
    document.getElementById('uploadProg').style.display = 'block';
    document.getElementById('uploadBar').style.width = '30%';
    const fd = new FormData();
    fd.append('file', file);
    fd.append('setPrimary', document.querySelectorAll('#imgGrid > div').length === 0);
    try {
      const res = await fetch(`/admin/items/${ITEM_ID}/images`, {
        method:'POST', headers:{'X-XSRF-TOKEN':CSRF}, body:fd });
      document.getElementById('uploadBar').style.width = '100%';
      if (res.ok) {
        const img = await res.json();
        addImgToGrid(img);
        setTimeout(()=>{ document.getElementById('uploadProg').style.display='none'; document.getElementById('uploadBar').style.width='0%'; }, 600);
      } else { alert('Upload failed.'); document.getElementById('uploadProg').style.display='none'; }
    } catch(e) { alert('Upload error: '+e.message); document.getElementById('uploadProg').style.display='none'; }
  }

  function addImgToGrid(img) {
    const div = document.createElement('div');
    div.id = `img-${img.id}`;
    div.style.cssText = 'position:relative; padding-top:80%; border-radius:2px; overflow:hidden; background:#F5E6B8;';
    div.innerHTML = `
      <img src="${img.s3Url}" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;"/>
      ${img.isPrimary ? '<div style="position:absolute;top:4px;left:4px;background:#C9A84C;color:#0B1628;font-size:0.55rem;font-weight:700;padding:2px 6px;border-radius:1px;">PRIMARY</div>' : ''}
      <div style="position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;gap:4px;opacity:0;"
           onmouseover="this.style.background='rgba(0,0,0,0.5)';this.style.opacity='1';"
           onmouseout="this.style.background='rgba(0,0,0,0)';this.style.opacity='0';">
        <button onclick="setPrimary('${ITEM_ID}','${img.id}')" style="background:rgba(201,168,76,0.9);color:#0B1628;border:none;border-radius:1px;font-size:0.6rem;padding:3px 7px;cursor:pointer;">★</button>
        <button onclick="deleteImg('${ITEM_ID}','${img.id}')" style="background:rgba(239,68,68,0.9);color:#fff;border:none;border-radius:1px;font-size:0.6rem;padding:3px 7px;cursor:pointer;">✕</button>
      </div>`;
    document.getElementById('imgGrid').appendChild(div);
  }

  async function deleteImg(itemId, imgId) {
    if (!confirm('Delete this image?')) return;
    const res = await fetch(`/admin/items/${itemId}/images/${imgId}`, { method:'DELETE', headers:{'X-XSRF-TOKEN':CSRF} });
    if (res.ok) document.getElementById(`img-${imgId}`)?.remove();
    else alert('Delete failed.');
  }

  async function setPrimary(itemId, imgId) {
    const res = await fetch(`/admin/items/${itemId}/images/${imgId}/primary`, { method:'POST', headers:{'X-XSRF-TOKEN':CSRF} });
    if (res.ok) location.reload(); else alert('Failed.');
  }

  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('dropZone').style.background='';
    document.getElementById('dropZone').style.borderColor='rgba(201,168,76,0.5)';
    uploadImg(e.dataTransfer.files[0]);
  }
</script>
<script th:unless="${mode == 'edit'}">
  function autoSlug(val) {
    if (document.getElementById('slugInput').dataset.manual) return;
    const s = val.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
    document.getElementById('slugInput').value = s;
    document.getElementById('slugPreview').textContent = s || 'slug';
  }
  document.getElementById('slugInput')?.addEventListener('input', function() {
    this.dataset.manual = '1';
    document.getElementById('slugPreview').textContent = this.value || 'slug';
  });
</script>
</th:block>
</body>
</html>
