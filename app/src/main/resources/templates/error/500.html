<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: html(content=~{::main-content}, scripts=~{::page-scripts}, headExtra=~{})}">
<head><title>Something Went Wrong</title></head>
<body>
<th:block th:fragment="main-content">
<main>
  <div class="max-w-xl mx-auto px-4 py-24 text-center">

    <div class="w-20 h-20 rounded-full mx-auto mb-8 flex items-center justify-center" style="background:#fee2e2;">
      <svg class="w-10 h-10" fill="none" stroke="#ef4444" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
      </svg>
    </div>

    <div class="w-12 h-px mx-auto mb-6" style="background:#C9A84C;"></div>

    <p class="text-xs tracking-widest uppercase mb-3" style="color:#C9A84C; font-family:'Montserrat',sans-serif; letter-spacing:0.2em;">
      Error <span th:text="${errorCode ?: 500}">500</span>
    </p>
    <h1 class="font-serif text-3xl font-light mb-4" style="color:#0B1628;">Something went wrong</h1>
    <p class="text-sm mb-8 leading-relaxed" style="color:#9ca3af; font-family:'Montserrat',sans-serif;"
       th:text="${errorMessage ?: 'An unexpected error occurred. Our team has been notified. Please try again shortly.'}">
      An unexpected error occurred.
    </p>

    <div style="display:flex; flex-wrap:wrap; gap:0.75rem; justify-content:center; margin-bottom:2rem;">
      <a th:href="@{/}" class="btn-gold px-8 py-3 rounded-sm text-xs">Go Home</a>
      <button onclick="history.back()" class="btn-navy px-8 py-3 rounded-sm text-xs">← Go Back</button>
    </div>

    <p class="text-xs" style="color:#9ca3af; font-family:'Montserrat',sans-serif;">
      If this problem persists, contact us at
      <a href="mailto:reservations@laulainluxerentals.com" style="color:#C9A84C;">
        reservations@laulainluxerentals.com
      </a>
    </p>
  </div>
</main>
</th:block>
<th:block th:fragment="page-scripts"></th:block>
</body>
</html>
