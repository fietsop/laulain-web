<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: html(content=~{::main-content}, scripts=~{::page-scripts}, headExtra=~{})}">
<head><title>Page Not Found</title></head>
<body>
<th:block th:fragment="main-content">
<main>
  <div class="max-w-xl mx-auto px-4 py-24 text-center">

    <!-- 404 display -->
    <div class="mb-6">
      <span class="font-serif font-light" style="font-size:8rem; color:#e8d9b8; line-height:1;">404</span>
    </div>

    <div class="w-12 h-px mx-auto mb-6" style="background:#C9A84C;"></div>

    <p class="text-xs tracking-widest uppercase mb-3" style="color:#C9A84C; font-family:'Montserrat',sans-serif; letter-spacing:0.2em;">Page Not Found</p>
    <h1 class="font-serif text-3xl font-light mb-4" style="color:#0B1628;">
      We couldn't find that page
    </h1>
    <p class="text-sm mb-8 leading-relaxed" style="color:#9ca3af; font-family:'Montserrat',sans-serif;"
       th:text="${errorMessage ?: 'The page you are looking for may have been moved, deleted, or never existed.'}">
      The page you are looking for may have been moved.
    </p>

    <div style="display:flex; flex-wrap:wrap; gap:0.75rem; justify-content:center;">
      <a th:href="@{/}" class="btn-gold px-8 py-3 rounded-sm text-xs">Go Home</a>
      <a th:href="@{/catalog}" class="btn-navy px-8 py-3 rounded-sm text-xs">Browse Collection</a>
    </div>
  </div>
</main>
</th:block>
<th:block th:fragment="page-scripts"></th:block>
</body>
</html>
