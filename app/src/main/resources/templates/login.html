<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In | Laulain Luxe Rentals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0B1628;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Montserrat', sans-serif;
    }
    .card {
      background: #FAF7F0;
      width: 100%;
      max-width: 420px;
      padding: 2.5rem 2rem;
      border-top: 3px solid #C9A84C;
    }
    .logo-area {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo-title {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 500;
      color: #0B1628;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .logo-sub {
      font-size: 0.6rem;
      font-weight: 300;
      color: #C9A84C;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, #C9A84C, transparent);
      margin: 1.25rem 0;
    }
    .form-label {
      display: block;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      background: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      color: #0B1628;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1.1rem;
    }
    .form-input:focus { border-color: #C9A84C; }
    .btn-submit {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #A07830, #C9A84C, #E8C96B);
      color: #0B1628;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 0.5rem;
    }
    .btn-submit:hover { opacity: 0.9; }
    .error-box {
      background: #FEE2E2;
      border-left: 3px solid #EF4444;
      color: #991B1B;
      padding: 10px 14px;
      font-size: 0.8rem;
      margin-bottom: 1.25rem;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.72rem;
      color: #6b7280;
      text-decoration: none;
    }
    .back-link:hover { color: #C9A84C; }
    .hint {
      font-size: 0.68rem;
      color: #9ca3af;
      text-align: center;
      margin-top: 1rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-area">
      <div class="logo-title">Laulain Luxe Rentals</div>
      <div class="logo-sub">Fate, TX &middot; Dallas Metro</div>
    </div>
    <div class="divider"></div>

    <div th:if="${param.error}" class="error-box">
      Invalid username or password. Please try again.
    </div>

    <form th:action="@{/login}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <label class="form-label" for="username">Username</label>
      <input class="form-input" type="text" id="username" name="username"
             autocomplete="username" autofocus required/>

      <label class="form-label" for="password">Password</label>
      <input class="form-input" type="password" id="password" name="password"
             autocomplete="current-password" required/>

      <button type="submit" class="btn-submit">Sign In</button>
    </form>

    <p class="hint">
      Admin: <strong>admin</strong> / admin123<br/>
      Customer: <strong>customer</strong> / customer123
    </p>

    <a th:href="@{/}" class="back-link">← Back to Home</a>
  </div>
</body>
</html>
