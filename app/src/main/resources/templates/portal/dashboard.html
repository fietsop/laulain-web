<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: html(content=~{::main-content}, scripts=~{::page-scripts}, headExtra=~{})}">
<head><title>My Bookings</title></head>
<body>
<th:block th:fragment="main-content">
<main>
  <!-- Header -->
  <div style="background:linear-gradient(135deg,#0B1628,#1E3260); padding:2.5rem 0;">
    <div class="max-w-4xl mx-auto px-4">
      <p class="text-xs tracking-widest uppercase mb-1" style="color:#C9A84C; font-family:'Montserrat',sans-serif; letter-spacing:0.2em;">Customer Portal</p>
      <h1 class="font-serif text-3xl font-light text-white">My Bookings</h1>
    </div>
  </div>

  <div class="max-w-4xl mx-auto px-4 py-8">

    <!-- Empty state -->
    <div th:if="${bookings.isEmpty()}" class="text-center py-20">
      <div class="font-serif text-4xl mb-4" style="color:#C9A84C;">✦</div>
      <h2 class="font-serif text-2xl font-light mb-3" style="color:#0B1628;">No bookings yet</h2>
      <p class="text-sm mb-6" style="color:#9ca3af; font-family:'Montserrat',sans-serif;">Ready to elevate your next event?</p>
      <a th:href="@{/booking/new}" class="btn-gold px-8 py-3 rounded-sm text-xs">Request a Booking</a>
    </div>

    <!-- Booking cards -->
    <div class="space-y-5" th:unless="${bookings.isEmpty()}">
      <div th:each="booking : ${bookings}"
           class="bg-white rounded-sm border shadow-sm overflow-hidden" style="border-color:#e8d9b8;">

        <!-- Card header -->
        <div class="flex items-center justify-between px-5 py-4 border-b" style="border-color:#f0e6d0; background:#faf9f5;">
          <div class="flex items-center gap-3">
            <div>
              <p class="font-semibold text-sm" style="color:#0B1628; font-family:'Montserrat',sans-serif;"
                 th:text="${booking.bookingNumber}">LLR-0001</p>
              <p class="text-xs" style="color:#9ca3af; font-family:'Montserrat',sans-serif;"
                 th:text="${booking.eventType} + ' · ' + ${#temporals.format(booking.eventDate,'MMM d, yyyy')}">
                Event · Date
              </p>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <span class="text-xs px-3 py-1 rounded-full font-semibold"
                  th:text="${booking.statusLabel}"
                  th:style="${booking.statusColor == 'gold'} ? 'background:#F5E6B8;color:#A07830;'
                            : (${booking.statusColor == 'green'} ? 'background:#d1fae5;color:#065f46;'
                            : (${booking.statusColor == 'blue'} ? 'background:#dbeafe;color:#1e40af;'
                            : (${booking.statusColor == 'red'} ? 'background:#fee2e2;color:#991b1b;'
                            : 'background:#f3f4f6;color:#374151;')))"
                  style="font-family:'Montserrat',sans-serif;">Status</span>
          </div>
        </div>

        <!-- Card body -->
        <div class="px-5 py-4">
          <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; margin-bottom:1rem; font-size:0.875rem;" style="font-family:'Montserrat',sans-serif;">
            <div>
              <p class="text-xs uppercase tracking-wider mb-1" style="color:#C9A84C;">Total</p>
              <p class="font-semibold" style="color:#0B1628;"
                 th:text="'$' + ${#numbers.formatDecimal(booking.totalAmount, 1, 2)}">$0.00</p>
            </div>
            <div>
              <p class="text-xs uppercase tracking-wider mb-1" style="color:#C9A84C;">Deposit</p>
              <p style="color:#0B1628;"
                 th:text="'$' + ${#numbers.formatDecimal(booking.depositAmount, 1, 2)}">$0.00</p>
            </div>
            <div>
              <p class="text-xs uppercase tracking-wider mb-1" style="color:#C9A84C;">Submitted</p>
              <p style="color:#0B1628;"
                 th:text="${#temporals.format(booking.createdAt, 'MMM d, yyyy')}">Date</p>
            </div>
          </div>

          <!-- Action buttons — context-aware by status -->
          <div class="flex flex-wrap gap-2">

            <!-- PENDING/QUOTE_SENT: Pay deposit -->
            <div th:if="${booking.status.name() == 'PENDING' or booking.status.name() == 'QUOTE_SENT'}">
              <!-- Pay deposit form -->
              <form th:action="@{/portal/payments/deposit/{id}(id=${booking.id})}" method="post" class="inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-gold px-4 py-2 rounded-sm text-xs">
                  Pay Deposit ($<span th:text="${#numbers.formatDecimal(booking.depositAmount, 1, 2)}">0</span>)
                </button>
              </form>
            </div>

            <!-- CONFIRMED: Pay balance -->
            <div th:if="${booking.status.name() == 'CONFIRMED'}">
              <form th:action="@{/portal/payments/balance/{id}(id=${booking.id})}" method="post" class="inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-navy px-4 py-2 rounded-sm text-xs">
                  Pay Balance
                </button>
              </form>
            </div>

            <!-- Payment history toggle -->
            <button th:onclick="'togglePayments(\'' + ${booking.id} + '\')'"
                    class="text-xs px-4 py-2 rounded-sm"
                    style="border:1px solid #e8d9b8; color:#374151; font-family:'Montserrat',sans-serif; text-transform:uppercase; letter-spacing:0.06em;">
              Payment History
            </button>
          </div>

          <!-- Payment history panel (toggled) -->
          <div th:id="'payments-' + ${booking.id}" class="hidden mt-4">
            <div class="border rounded-sm overflow-hidden" style="border-color:#e8d9b8;">
              <div class="px-3 py-2" style="background:#0B1628;">
                <p class="text-xs uppercase tracking-wider" style="color:#C9A84C; font-family:'Montserrat',sans-serif;">Payment History</p>
              </div>
              <div th:id="'payments-list-' + ${booking.id}" class="p-3">
                <p class="text-xs text-center" style="color:#9ca3af; font-family:'Montserrat',sans-serif;">Loading…</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- New booking CTA -->
    <div class="mt-10 text-center">
      <a th:href="@{/booking/new}" class="btn-gold px-8 py-3 rounded-sm text-xs">+ New Booking</a>
    </div>
  </div>
</main>
</th:block>

<th:block th:fragment="page-scripts">
<script th:inline="javascript">
  const CSRF = document.cookie.match(/XSRF-TOKEN=([^;]+)/)?.[1] || '';
  const loaded = new Set();

  async function togglePayments(bookingId) {
    const panel = document.getElementById(`payments-${bookingId}`);
    const list  = document.getElementById(`payments-list-${bookingId}`);
    panel.classList.toggle('hidden');

    if (!panel.classList.contains('hidden') && !loaded.has(bookingId)) {
      loaded.add(bookingId);
      try {
        const res  = await fetch(`/portal/payments/booking/${bookingId}`);
        const payments = await res.json();

        if (!payments.length) {
          list.innerHTML = '<p class="text-xs text-center py-3" style="color:#9ca3af;font-family:Montserrat,sans-serif;">No payments recorded yet.</p>';
          return;
        }

        const statusColors = {
          SUCCEEDED: 'background:#d1fae5;color:#065f46;',
          PENDING:   'background:#f3f4f6;color:#374151;',
          FAILED:    'background:#fee2e2;color:#991b1b;',
          REFUNDED:  'background:#ede9fe;color:#5b21b6;',
        };

        list.innerHTML = payments.map(p => `
          <div class="flex items-center justify-between py-2 border-b text-sm" style="border-color:#f0e6d0;">
            <div style="font-family:Montserrat,sans-serif;">
              <span class="font-medium" style="color:#0B1628;">${p.typeLabel}</span>
              <span class="text-xs ml-2" style="color:#9ca3af;">${new Date(p.createdAt).toLocaleDateString()}</span>
            </div>
            <div class="flex items-center gap-2">
              <span class="text-xs px-2 py-0.5 rounded-full font-semibold"
                    style="${statusColors[p.status] || ''}font-family:Montserrat,sans-serif;">
                ${p.statusLabel}
              </span>
              <span class="font-semibold" style="color:#0B1628;font-family:Montserrat,sans-serif;">
                $${Math.abs(parseFloat(p.amount)).toFixed(2)}
              </span>
            </div>
          </div>`).join('');
      } catch (e) {
        list.innerHTML = '<p class="text-xs text-center py-3 text-red-500">Failed to load payments.</p>';
      }
    }
  }
</script>
</th:block>
</body>
</html>
