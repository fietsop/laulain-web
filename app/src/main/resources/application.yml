# ============================================================
#  Laulain Luxe Rentals — Base Application Configuration
# ============================================================

spring:
  application:
    name: laulain-luxe-rentals

  # ---- JPA ----
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  # ---- Flyway ----
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # ---- Thymeleaf ----
  thymeleaf:
    cache: false
    encoding: UTF-8
    mode: HTML
    prefix: classpath:/templates/
    suffix: .html

  # ---- File Upload ----
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

  # ---- Jackson ----
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    time-zone: UTC

  # ---- Cache (in-memory for initial deployment) ----
  cache:
    type: simple

# ---- Actuator ----
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

# ---- Application Custom Properties ----
app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  name: Laulain Luxe Rentals

  # Business Rules
  business:
    buffer-days: 1
    quote-expiry-days: 7
    reminder-hours-before: 48
    min-booking-days-ahead: 3
    delivery-fee-per-mile: 1.50
    tax-rate: 0.0825
    service-areas:
      - "750"
      - "751"
      - "752"
      - "753"
      - "754"
      - "755"
      - "760"
      - "761"

# ---- Logging ----
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.laulain: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
