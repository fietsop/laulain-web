# ============================================================
#  Laulain Luxe Rentals — K8s Dev Overlay
#  Usage: kubectl apply -k k8s/overlays/dev
# ============================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: laulain-dev

resources:
  - ../../base

patches:
  # Single replica in dev to save costs
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: laulain-app

  # Smaller resource requests for dev
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "100m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "500m"
    target:
      kind: Deployment
      name: laulain-app

  # Dev-specific configmap patch
  - patch: |-
      - op: replace
        path: /data/SPRING_PROFILES_ACTIVE
        value: dev
      - op: replace
        path: /data/APP_BASE_URL
        value: http://dev.laulainluxerentals.com
    target:
      kind: ConfigMap
      name: laulain-config

images:
  - name: laulain-luxe-rentals
    newTag: dev-latest
